# Docker: container IPs change when api/frontend are recreated. Static `upstream { server api:4000 }`
# resolves the hostname only at nginx start → stale IP → "connect() refused" while healthchecks still pass.
# Variable proxy_pass + resolver 127.0.0.11 re-resolves on each request (Docker embedded DNS).

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml font/woff2;

    client_max_body_size 10M;

    location /api/ {
        set $erp_api_upstream "api:4000";
        proxy_pass http://$erp_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
    }

    location /uploads/ {
        set $erp_api_upstream "api:4000";
        proxy_pass http://$erp_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        set $erp_fe_upstream "frontend:80";
        proxy_pass http://$erp_fe_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
