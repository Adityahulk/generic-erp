# =============================================================================
# After certbot: replace the entire `nginx:` block under `services:` in
# docker-compose.yml with the YAML below (not as a second compose file).
# =============================================================================

  nginx:
    image: nginx:alpine
    container_name: vehicle_erp_nginx
    restart: unless-stopped
    networks: [erp]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
